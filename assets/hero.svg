<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Two pillars: distortion-aware spatial AI and compute-grounded spatial agents">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2545"/>
      <stop offset="100%" stop-color="#1d3a6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E76F51"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
  </defs>

  <rect width="800" height="320" fill="url(#navy)"/>

  <!-- Left pillar: distortion -->
  <g transform="translate(80,60)">
    <rect width="280" height="200" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
    <text x="20" y="36" fill="#f4a261" font-family="Lato, sans-serif" font-size="12" letter-spacing="2">PILLAR A</text>
    <text x="20" y="62" fill="white" font-family="Lato, sans-serif" font-size="18" font-weight="700">Distortion-Aware</text>
    <text x="20" y="84" fill="white" font-family="Lato, sans-serif" font-size="18" font-weight="700">Spatial AI</text>

    <!-- "trajectory with gap" visual -->
    <g transform="translate(20, 110)">
      <path d="M 0 30 L 60 30" stroke="white" stroke-width="2"/>
      <path d="M 60 30 L 100 30" stroke="white" stroke-width="2" stroke-dasharray="3 4" opacity="0.5"/>
      <path d="M 100 30 L 160 30" stroke="white" stroke-width="2"/>
      <circle cx="0" cy="30" r="4" fill="#E76F51"/>
      <circle cx="60" cy="30" r="4" fill="#E76F51"/>
      <circle cx="100" cy="30" r="4" fill="#f4a261"/>
      <circle cx="160" cy="30" r="4" fill="#E76F51"/>
      <ellipse cx="80" cy="30" rx="40" ry="14" fill="none" stroke="#f4a261" stroke-width="1.5" stroke-dasharray="2 3"/>
      <text x="60" y="62" fill="rgba(255,255,255,0.7)" font-family="Lato, sans-serif" font-size="11">trajectory gap</text>
    </g>
  </g>

  <!-- Right pillar: agents -->
  <g transform="translate(440,60)">
    <rect width="280" height="200" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
    <text x="20" y="36" fill="#f4a261" font-family="Lato, sans-serif" font-size="12" letter-spacing="2">PILLAR B</text>
    <text x="20" y="62" fill="white" font-family="Lato, sans-serif" font-size="18" font-weight="700">Compute-Grounded</text>
    <text x="20" y="84" fill="white" font-family="Lato, sans-serif" font-size="18" font-weight="700">Spatial Agents</text>

    <!-- scene graph visual -->
    <g transform="translate(40, 110)">
      <circle cx="0" cy="40" r="10" fill="#E76F51"/>
      <circle cx="90" cy="0" r="10" fill="#f4a261"/>
      <circle cx="90" cy="80" r="10" fill="#f4a261"/>
      <circle cx="180" cy="40" r="10" fill="#E76F51"/>
      <line x1="0" y1="40" x2="90" y2="0" stroke="white" stroke-width="1.5"/>
      <line x1="0" y1="40" x2="90" y2="80" stroke="white" stroke-width="1.5"/>
      <line x1="90" y1="0" x2="180" y2="40" stroke="white" stroke-width="1.5"/>
      <line x1="90" y1="80" x2="180" y2="40" stroke="white" stroke-width="1.5"/>
      <line x1="90" y1="0" x2="90" y2="80" stroke="white" stroke-width="1.5" stroke-dasharray="3 3"/>
    </g>
  </g>

  <!-- bridge -->
  <g transform="translate(370,140)">
    <line x1="0" y1="20" x2="60" y2="20" stroke="url(#accent)" stroke-width="3"/>
    <text x="-2" y="44" fill="#f4a261" font-family="Lato, sans-serif" font-size="11" text-anchor="start">bridge</text>
  </g>
</svg>
